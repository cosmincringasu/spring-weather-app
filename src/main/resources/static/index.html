<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚙ Spring Steam Works</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=IM+Fell+English+SC&family=Special+Elite&display=swap" rel="stylesheet">
    <style>
        :root {
            --brass:   #b88a3e;
            --brass-d: #5e3f1c;
            --copper:  #a4582b;
            --rust:    #8a3b12;
            --ink:     #3a2a18;
            --faded:   #9a8050;
            --parch-1: #f3e7c8;
            --parch-2: #e4cf9f;
        }
        body {
            font-family: 'Special Elite', 'Courier New', monospace;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 2rem 0;
            gap: 1.5rem;
            color: var(--ink);
            background:
                radial-gradient(circle at 50% -10%, rgba(198,150,74,0.20), transparent 55%),
                radial-gradient(circle at 50% 110%, rgba(120,80,40,0.28), transparent 55%),
                linear-gradient(160deg, #261a10 0%, #170f08 55%, #0e0905 100%) fixed;
            box-sizing: border-box;
        }
        .card {
            position: relative;
            padding: 2rem 3rem;
            border-radius: 10px;
            text-align: center;
            min-width: 320px;
            width: 100%;
            max-width: 480px;
            box-sizing: border-box;
            color: var(--ink);
            border: 3px solid var(--brass-d);
            background:
                radial-gradient(circle at 15px 15px,                       #7c5a2e 2.6px, transparent 3.2px),
                radial-gradient(circle at calc(100% - 15px) 15px,          #7c5a2e 2.6px, transparent 3.2px),
                radial-gradient(circle at 15px calc(100% - 15px),          #7c5a2e 2.6px, transparent 3.2px),
                radial-gradient(circle at calc(100% - 15px) calc(100% - 15px), #7c5a2e 2.6px, transparent 3.2px),
                linear-gradient(160deg, var(--parch-1), var(--parch-2));
            background-repeat: no-repeat;
            box-shadow:
                inset 0 0 0 2px var(--brass),
                inset 0 0 22px rgba(94,63,28,0.28),
                0 6px 20px rgba(0,0,0,0.55);
        }
        h1 {
            font-family: 'Cinzel Decorative', serif;
            font-weight: 900;
            color: #6e4a1e;
            font-size: 1.9rem;
            margin: 0 0 1rem;
            letter-spacing: 1px;
            text-shadow: 1px 1px 0 #e7c98b, 2px 2px 0 rgba(0,0,0,0.15);
        }
        h2 {
            font-family: 'IM Fell English SC', serif;
            color: #5a3d1d;
            font-size: 1.4rem;
            font-weight: normal;
            margin: 0 0 1rem;
            letter-spacing: 0.5px;
            border-bottom: 2px groove var(--brass);
            padding-bottom: 0.4rem;
        }
        h2::before { content: '⚙ '; color: var(--copper); }
        h2::after  { content: ' ⚙'; color: var(--copper); }
        #message {
            font-family: 'IM Fell English SC', serif;
            font-size: 1.9rem;
            color: var(--rust);
            margin-bottom: 1.5rem;
            text-shadow: 1px 1px 0 rgba(231,201,139,0.7);
        }
        .buttons { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; }
        button {
            font-family: 'Special Elite', monospace;
            padding: 0.55rem 1.2rem;
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            color: #2a1c0c;
            border: 2px solid var(--brass-d);
            border-radius: 6px;
            background: linear-gradient(#d8b15c, #a87c30);
            box-shadow: inset 0 1px 0 rgba(255,244,214,0.7), inset 0 -2px 4px rgba(94,63,28,0.4), 0 3px 6px rgba(0,0,0,0.4);
        }
        button:hover { background: linear-gradient(#e6c074, #b98a3a); }
        button:active { transform: translateY(1px); box-shadow: inset 0 2px 5px rgba(94,63,28,0.6); }
        button:disabled {
            background: linear-gradient(#b9ad94, #968a72);
            color: #5a4f3c; cursor: default;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.3);
        }
        .weather-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.5rem 1.5rem;
            text-align: left;
            margin-top: 0.5rem;
        }
        .weather-grid .label { color: var(--faded); font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; }
        .weather-grid .value { font-family: 'IM Fell English SC', serif; color: #5a3d1d; font-size: 1.25rem; }
        #weather-location { font-family: 'IM Fell English SC', serif; font-size: 1.45rem; color: #6e4a1e; margin-bottom: 1rem; }
        #weather-status { color: var(--faded); font-style: italic; }

        /* Chat */
        #chat-box {
            height: 220px;
            overflow-y: auto;
            border: 2px solid var(--brass-d);
            border-radius: 6px;
            padding: 0.75rem;
            margin-bottom: 0.75rem;
            text-align: left;
            background: #efe1c0;
            box-shadow: inset 0 0 12px rgba(94,63,28,0.3);
        }
        #chat-box::-webkit-scrollbar { width: 10px; }
        #chat-box::-webkit-scrollbar-track { background: #d9c595; }
        #chat-box::-webkit-scrollbar-thumb { background: var(--brass); border-radius: 5px; border: 1px solid var(--brass-d); }
        .chat-msg { margin: 0.3rem 0; font-size: 0.95rem; }
        .chat-msg .who { font-weight: bold; color: var(--copper); }
        .chat-msg .txt { color: var(--ink); }
        .chat-inputs { display: flex; gap: 0.5rem; margin-bottom: 0.5rem; align-items: stretch; }
        .chat-inputs input {
            flex: 1;
            min-width: 0;
            font-family: 'Special Elite', monospace;
            padding: 0.4rem 0.7rem;
            border: 2px solid var(--brass-d);
            border-radius: 5px;
            font-size: 0.95rem;
            color: var(--ink);
            background: #f6ecd2;
            outline: none;
        }
        .chat-inputs input::placeholder { color: #b09a6a; }
        .chat-inputs input:focus { border-color: var(--copper); box-shadow: 0 0 6px rgba(164,88,43,0.4); }
        .chat-inputs button {
            flex-shrink: 0;
            padding: 0.4rem 1rem;
            font-size: 0.9rem;
            white-space: nowrap;
        }
        #chat-status { font-size: 0.75rem; color: var(--faded); min-height: 1rem; letter-spacing: 1px; }

        /* Joke of the Day */
        #joke-setup { font-family: 'IM Fell English SC', serif; color: var(--ink); font-size: 1.2rem; margin-bottom: 0.75rem; }
        #joke-punchline { font-family: 'IM Fell English SC', serif; color: var(--rust); font-size: 1.35rem; min-height: 1.4rem; }
        #joke-date { font-size: 0.75rem; color: var(--faded); margin-top: 0.75rem; min-height: 1rem; letter-spacing: 1px; }
        #joke-reveal { margin-top: 1rem; }

        /* Brass nameplate (games) */
        .nameplate {
            display: flex;
            justify-content: space-between;
            gap: 1rem;
            padding: 0.75rem 1.5rem;
        }
        .nameplate a {
            font-family: 'Special Elite', monospace;
            font-size: 13px;
            font-weight: bold;
            letter-spacing: 1px;
            text-decoration: none;
            text-shadow: 1px 1px 0 rgba(231,201,139,0.6);
        }
        .nameplate a:hover { text-decoration: underline; }
        .game-invaders { color: #3f6f4f; }
        .game-parking  { color: #8a5a1e; }
    </style>
</head>
<body>
    <div class="card nameplate">
        <a href="/game.html" class="game-invaders">🕹 SPACE INVADERS →</a>
        <a href="/parking.html" class="game-parking">🚗 VALET PARKING →</a>
    </div>

    <div class="card">
        <h1>Spring Boot REST API</h1>
        <div id="message">Click a button...</div>
        <div class="buttons">
            <button onclick="greet('/api/hello')">Hello World</button>
            <button onclick="greet('/api/hello/maria'); speakMaria()">Hello Maria</button>
        </div>
    </div>

    <div class="card">
        <h2>Weather at Your Location</h2>
        <div id="weather-location" style="display:none"></div>
        <div id="weather-status">Fetching weather...</div>
        <div id="w-updated" style="font-size:0.75rem;color:#9a8050;margin-top:0.5rem;min-height:1rem;letter-spacing:1px"></div>
        <div id="weather-grid" class="weather-grid" style="display:none">
            <span class="label">Condition</span>  <span class="value" id="w-desc"></span>
            <span class="label">Temperature</span> <span class="value" id="w-temp"></span>
            <span class="label">Wind speed</span>  <span class="value" id="w-wind"></span>
        </div>
    </div>

    <div class="card">
        <h2>Joke of the Day</h2>
        <div id="joke-setup">Loading today's joke...</div>
        <div id="joke-punchline"></div>
        <div id="joke-reveal" style="display:none">
            <button onclick="revealPunchline()">Reveal punchline</button>
        </div>
        <div id="joke-date"></div>
    </div>

    <div class="card">
        <h2>Live Chat</h2>
        <div class="chat-inputs">
            <input id="username" type="text" placeholder="Your name" style="max-width:120px" />
            <input id="chat-input" type="text" placeholder="Type a message..." />
            <button id="send-btn" onclick="sendMessage()" disabled>Send</button>
        </div>
        <div id="chat-box"></div>
        <div id="chat-status">Connecting...</div>
    </div>

    <script src="/webjars/sockjs-client/1.5.1/sockjs.min.js"></script>
    <script src="/webjars/stomp-websocket/2.3.4/stomp.min.js"></script>
    <script>
        // Greet endpoints
        function greet(url) {
            fetch(url)
                .then(res => res.text())
                .then(text => document.getElementById('message').textContent = text)
                .catch(() => document.getElementById('message').textContent = 'Error fetching message');
        }

        // Maria's serious Romanian line, spoken via the browser's text-to-speech
        function speakMaria() {
            if (!('speechSynthesis' in window)) return;
            const phrase = 'Vreau vacanță! Vreau să bat pământul!';
            const speak = () => {
                const utter = new SpeechSynthesisUtterance(phrase);
                utter.lang = 'ro-RO';
                utter.rate = 0.9;   // a touch slower for a serious delivery
                utter.pitch = 0.9;  // slightly lower pitch, but still a female voice
                const voices = window.speechSynthesis.getVoices();
                const voice =
                    voices.find(v => /^ro\b|ro[-_]ro/i.test(v.lang) && /female|woman|ioana|maria|andreea/i.test(v.name)) ||
                    voices.find(v => /^ro\b|ro[-_]ro/i.test(v.lang)) ||
                    voices.find(v => /female|woman|zira|samantha|google uk english female/i.test(v.name));
                if (voice) utter.voice = voice;
                window.speechSynthesis.cancel();
                window.speechSynthesis.speak(utter);
            };
            if (window.speechSynthesis.getVoices().length) {
                speak();
            } else {
                window.speechSynthesis.addEventListener('voiceschanged', speak, { once: true });
            }
        }

        // Weather
        function loadWeather() {
            fetch('/api/weather')
                .then(res => res.json())
                .then(data => {
                    document.getElementById('weather-status').style.display = 'none';
                    document.getElementById('weather-location').textContent = data.city + ', ' + data.country;
                    document.getElementById('weather-location').style.display = 'block';
                    document.getElementById('w-desc').textContent = data.description;
                    document.getElementById('w-temp').textContent = data.temperature + ' °C';
                    document.getElementById('w-wind').textContent = data.windspeed + ' km/h';
                    document.getElementById('weather-grid').style.display = 'grid';
                    document.getElementById('w-updated').textContent = 'Updated: ' + new Date().toLocaleTimeString();
                })
                .catch(() => {
                    document.getElementById('weather-status').textContent = 'Could not load weather.';
                });
        }
        loadWeather();
        setInterval(loadWeather, 60000);

        // Joke of the Day
        function loadJoke() {
            fetch('/api/joke')
                .then(res => res.json())
                .then(data => {
                    document.getElementById('joke-setup').textContent = data.setup;
                    document.getElementById('joke-punchline').textContent = '';
                    document.getElementById('joke-punchline').dataset.text = data.punchline;
                    document.getElementById('joke-reveal').style.display = 'block';
                    document.getElementById('joke-date').textContent = 'Joke for ' + data.date;
                })
                .catch(() => {
                    document.getElementById('joke-setup').textContent = 'Could not load the joke of the day.';
                });
        }

        function revealPunchline() {
            const el = document.getElementById('joke-punchline');
            el.textContent = el.dataset.text || '';
            document.getElementById('joke-reveal').style.display = 'none';
        }

        loadJoke();

        // Chat
        const socket = new SockJS('/ws');
        const stomp = Stomp.over(socket);
        stomp.debug = null;

        stomp.connect({}, () => {
            document.getElementById('chat-status').textContent = 'Connected';
            document.getElementById('send-btn').disabled = false;

            stomp.subscribe('/topic/messages', frame => {
                const msg = JSON.parse(frame.body);
                const box = document.getElementById('chat-box');
                const el = document.createElement('div');
                el.className = 'chat-msg';
                el.innerHTML = `<span class="who">${escapeHtml(msg.username)}:</span> <span class="txt">${escapeHtml(msg.text)}</span>`;
                box.appendChild(el);
                box.scrollTop = box.scrollHeight;
            });
        }, () => {
            document.getElementById('chat-status').textContent = 'Disconnected — reload to reconnect';
            document.getElementById('send-btn').disabled = true;
        });

        function sendMessage() {
            const username = document.getElementById('username').value.trim() || 'Anonymous';
            const text = document.getElementById('chat-input').value.trim();
            if (!text) return;
            stomp.send('/app/chat', {}, JSON.stringify({ username, text }));
            document.getElementById('chat-input').value = '';
        }

        document.getElementById('chat-input').addEventListener('keydown', e => {
            if (e.key === 'Enter') sendMessage();
        });

        function escapeHtml(str) {
            return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
        }
    </script>
</body>
</html>
